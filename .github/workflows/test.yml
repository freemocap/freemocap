name: Tests

on:
  pull_request:
    branches: [main, development]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11"]
        include:
          # Full matrix only on PRs to main
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run linter (ruff)
        run: uv run ruff check freemocap/

      - name: Run tests
        run: uv run pytest freemocap/tests/ -v --tb=short --timeout=300 --timeout-method=thread

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: freemocap-ui

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: freemocap-ui/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx tsc --noEmit
