name: Build installers (Pyinstaller + Electron)

on:
  push:
    branches:
      - development
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════
  # BUILD — runs on all 5 platform/arch combos
  # ═══════════════════════════════════════════════════════
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows/Linux x64 ship both a CUDA (GPU-accelerated) and a CPU-only
          # variant — same OS/arch, different onnxruntime backend, selected via
          # `uv sync --extra ${{ matrix.variant }}` and FREEMOCAP_BUILD_VARIANT.
          # macOS and Linux arm64 only ever build the CPU variant: macOS has no
          # CUDA path, and NVIDIA's PyPI CUDA wheels used here are x86_64-only.
          - os: windows-latest
            platform: windows
            arch: x64
            variant: cuda
            label: windows-x64-cuda
            server-binary: freemocap_server.exe
            electron-arch: x64

          - os: windows-latest
            platform: windows
            arch: x64
            variant: cpu
            label: windows-x64-cpu
            server-binary: freemocap_server.exe
            electron-arch: x64

          - os: macos-15-intel
            platform: macos
            arch: x64
            variant: cpu
            label: macos-x64-intel
            server-binary: freemocap_server
            electron-arch: x64

          - os: macos-latest
            platform: macos
            arch: arm64
            variant: cpu
            label: macos-arm64-apple-silicon
            server-binary: freemocap_server
            electron-arch: arm64

          - os: ubuntu-22.04
            platform: linux
            arch: x64
            variant: cuda
            label: linux-x64-cuda
            server-binary: freemocap_server
            electron-arch: x64

          - os: ubuntu-22.04
            platform: linux
            arch: x64
            variant: cpu
            label: linux-x64-cpu
            server-binary: freemocap_server
            electron-arch: x64

          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            variant: cpu
            label: linux-arm64
            server-binary: freemocap_server
            electron-arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Windows code-signing prereqs ──
      - name: Validate code signing prerequisites
        if: matrix.platform == 'windows'
        run: |
          $missingSecrets = @()

          if (-not "${{ secrets.AZURE_TENANT_ID }}") { $missingSecrets += "AZURE_TENANT_ID" }
          if (-not "${{ secrets.AZURE_CLIENT_ID }}") { $missingSecrets += "AZURE_CLIENT_ID" }
          if (-not "${{ secrets.AZURE_CLIENT_SECRET }}") { $missingSecrets += "AZURE_CLIENT_SECRET" }
          if (-not "freemocap") { $missingSecrets += "TRUSTED_SIGNING_ACCOUNT_NAME" }

          if ($missingSecrets.Count -gt 0) {
            Write-Error "Missing required secrets for code signing: $($missingSecrets -join ', ')"
            exit 1
          }

          Write-Output "All required code signing secrets are available"
        shell: pwsh

      # ── macOS code-signing prereqs ──
      - name: Validate macOS code signing prerequisites
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          MISSING=()
          [ -z "${{ secrets.MAC_CERTIFICATE_P12 }}" ] && MISSING+=("MAC_CERTIFICATE_P12")
          [ -z "${{ secrets.MAC_CERTIFICATE_PASSWORD }}" ] && MISSING+=("MAC_CERTIFICATE_PASSWORD")
          [ -z "${{ secrets.APPLE_ID }}" ] && MISSING+=("APPLE_ID")
          [ -z "${{ secrets.APPLE_ID_PASSWORD }}" ] && MISSING+=("APPLE_ID_PASSWORD")
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && MISSING+=("APPLE_TEAM_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for macOS code signing: ${MISSING[*]}"
            exit 1
          fi
          echo "All required macOS code signing secrets are available"

      # ── macOS certificate installation ──
      - name: Install macOS signing certificate
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create and configure a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the temporary keychain to the search list (prepend it)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "macOS signing certificate installed successfully"

      # ── Linux system dependencies ──
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libv4l-dev \
            libfuse2 \
            upx-ucl

      # ── macOS UPX for binary compression ──
      - name: Install UPX (macOS)
        if: matrix.platform == 'macos'
        run: brew install upx

      # ── Common setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv and enable cache
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: false

      - name: Create venv
        run: uv venv

      - name: Install the project dependencies
        run: uv sync --no-default-groups --group ${{ matrix.variant }}

      - name: Verify installation 1/3
        run: uv pip show freemocap
      - name: Verify installation 2/3
        run: uv pip show pyinstaller
      - name: Verify installation 3/3
        run: uv pip show opencv-contrib-python

      # ── Write build metadata and secrets into the Python package ──
      - name: Write build info
        shell: bash
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > freemocap/build_info.py << EOF
          """Build metadata and secrets populated by CI."""
          BUILD_GIT_SHA: str = "${{ github.sha }}"
          BUILD_GIT_SHA_SHORT: str = "${SHA_SHORT}"
          BUILD_NUMBER: str = "${{ github.run_number }}"
          BUILD_TIMESTAMP: str = "${TIMESTAMP}"
          BUILD_TAG: str = "${{ github.ref_name }}"
          SKELLYPINGS_SERVER_URL: str = "https://skellypings-401698866387.northamerica-northeast1.run.app"
          SKELLYPINGS_SECRET: str = "${{ secrets.SKELLYPINGS_SECRET }}"
          EOF

          echo "--- build_info.py (secret redacted) ---"
          sed 's/SKELLYPINGS_SECRET:.*/SKELLYPINGS_SECRET: str = "***"/' freemocap/build_info.py

      # ── PyInstaller build ──
      - name: Build with PyInstaller
        env:
          FREEMOCAP_BUILD_VARIANT: ${{ matrix.variant }}
        run: |
          uv pip install pyinstaller
          uv run pyinstaller ./freemocap.spec --clean

      # ── Move server binary into freemocap-ui/ ──
      # PyInstaller onedir output is a directory (dist/freemocap_server/) containing
      # the exe plus its _internal/ support files — always named "freemocap_server"
      # regardless of platform (the .exe extension only applies to the exe inside it).
      - name: Move server binary into freemocap-ui (Windows)
        if: matrix.platform == 'windows'
        run: |
          Move-Item -Path ".\dist\freemocap_server" -Destination ".\freemocap-ui\freemocap_server"

      - name: Move server binary into freemocap-ui (macOS/Linux)
        if: matrix.platform != 'windows'
        run: |
          mv "./dist/freemocap_server" "./freemocap-ui/freemocap_server"
          chmod +x "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"

      # ── Windows code signing (server binary) ──
      - name: Sign freemocap_server.exe with Trusted Signing
        if: matrix.platform == 'windows'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: freemocap
          certificate-profile-name: freemocap
          files: ${{ github.workspace }}\freemocap-ui\freemocap_server\${{ matrix.server-binary }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256


      # ── macOS code signing (server binary) ──
      # Onedir ships many loose .dylib/.so files under _internal/ that notarization
      # also requires to be signed, not just the main executable.
      - name: Sign freemocap_server with codesign
        if: matrix.platform == 'macos'
        run: |
          echo "Signing nested binaries in freemocap_server/_internal..."
          find "./freemocap-ui/freemocap_server/_internal" -type f \( -name "*.dylib" -o -name "*.so" \) -exec \
            codesign --force --options runtime --sign "Developer ID Application" --timestamp {} \;

          echo "Signing main executable..."
          codesign --force --options runtime --sign "Developer ID Application" \
            --timestamp \
            "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"
          codesign --verify --deep --verbose "./freemocap-ui/freemocap_server"
          echo "Server binary signed and verified successfully"
      # ── Upload server-only artifact ──
      - name: Upload server binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.label }}
          path: |
            freemocap-ui/freemocap_server/
          include-hidden-files: true

      # ── Electron build ──

      # ── Validate server binary exists and is executable ──
      - name: Validate server binary present and executable
        run: |
          echo "Checking for server binary at ./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"
          if [ ! -d "./freemocap-ui/freemocap_server" ] || [ ! -f "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}" ]; then
            echo "::error::Server binary not found: ./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"
            ls -la ./freemocap-ui || true
            exit 1
          fi

          # The launcher loads everything from its sibling _internal/ directory,
          # so its absence means the onedir tree was moved or collected wrong.
          if [ ! -d "./freemocap-ui/freemocap_server/_internal" ]; then
            echo "::error::Missing _internal/ next to the server launcher"
            ls -la ./freemocap-ui/freemocap_server
            exit 1
          fi

          echo "Found server binary:"
          ls -la "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"
          # On Unix-like, ensure executable bit is set
          if [ "${{ matrix.platform }}" != "windows" ]; then
            if [ ! -x "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}" ]; then
              echo "Server binary is not executable, setting +x"
              chmod +x "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}" || true
            fi
          fi


      - name: Install UI dependencies
        run: |
          cd freemocap-ui
          npm install

      - name: Build UI (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd freemocap-ui
          npm run build -- --publish never

      - name: Build UI (macOS)
        if: matrix.platform == 'macos'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd freemocap-ui
          for attempt in 1 2 3; do
            echo "=== Build + notarize attempt $attempt of 3 ==="
            npm run build -- --${{ matrix.electron-arch }} --publish never && break
            if [ "$attempt" -eq 3 ]; then
              echo "All 3 attempts failed"
              exit 1
            fi
            echo "Build/notarize failed on attempt $attempt. Retrying in 30s..."
            sleep 30
          done

      - name: Build UI (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd freemocap-ui
          npm run build -- --${{ matrix.electron-arch }} --publish never

      # ── Windows installer signing ──
      - name: Sign Electron installer with Trusted Signing
        if: matrix.platform == 'windows'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: freemocap
          certificate-profile-name: freemocap
          files-folder: ${{ github.workspace }}\freemocap-ui\release
          files-folder-filter: "*.exe"
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Upload final installer artifacts (uses label for human-readable names) ──
      - name: Upload installer artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.exe
          include-hidden-files: true

      - name: Upload installer artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.dmg
            freemocap-ui/release/*/*.zip
          include-hidden-files: true

      - name: Upload installer artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.AppImage
            freemocap-ui/release/*/*.deb
          include-hidden-files: true

      # ── Upload auto-update metadata (latest*.yml) ──
      # electron-updater supports only one update channel per platform/arch, so
      # the CUDA variant is treated as the auto-update channel; CPU-variant
      # users get new installers manually via the release page.
      - name: Upload auto-update metadata (Windows)
        if: matrix.platform == 'windows' && matrix.variant == 'cuda'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest.yml
          include-hidden-files: true

      - name: Upload auto-update metadata (macOS)
        if: matrix.platform == 'macos' && matrix.arch == 'x64'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest-mac.yml
          include-hidden-files: true

      - name: Upload auto-update metadata (macOS ARM)
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest-mac.yml
          include-hidden-files: true

      - name: Upload auto-update metadata (Linux)
        if: matrix.platform == 'linux' && matrix.arch == 'x64' && matrix.variant == 'cuda'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest-linux.yml
          include-hidden-files: true


      # ── macOS keychain cleanup ──
      - name: Clean up macOS keychain
        if: matrix.platform == 'macos' && always()
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
  # ═══════════════════════════════════════════════════════
  # RELEASE — only runs on tag pushes (e.g. v2.0.0)
  #
  # Downloads all build artifacts and renames them with
  # human-readable platform/arch labels for the GitHub
  # Release page.
  # ═══════════════════════════════════════════════════════
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Extract version from tag (e.g. refs/tags/v2.0.0 → 2.0.0)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION"

          # ── Server binaries ──
          # Artifact directories are named server-<label>, e.g.:
          #   server-windows-x64-cuda, server-windows-x64-cpu, server-macos-x64-intel,
          #   server-macos-arm64-apple-silicon, server-linux-x64-cuda,
          #   server-linux-x64-cpu, server-linux-arm64
          # Strip the "server-" prefix to get the human-readable suffix.
          # Each artifact is a PyInstaller onedir folder (exe + _internal/ support
          # files), so it's zipped into a single release asset rather than copied.
          for dir in artifacts/server-*; do
            label=$(basename "$dir" | sed 's/^server-//')

            if [ -f "$dir/freemocap_server.exe" ]; then
              exe_name="freemocap_server.exe"
            elif [ -f "$dir/freemocap_server" ]; then
              exe_name="freemocap_server"
            else
              echo "::error::No server binary found in $dir"
              exit 1
            fi

            chmod +x "$dir/$exe_name" || true
            (cd "$dir" && zip -r -q -X "$OLDPWD/release-assets/freemocap_server_${VERSION}_${label}.zip" .)
          done

          # ── App installers ──
          # Artifact directories are named installer-<label>, e.g.:
          #   installer-windows-x64-cuda, installer-windows-x64-cpu,
          #   installer-macos-x64-intel, etc.
          # Electron-builder names only contain the arch (x64/arm64),
          # so we rename each file to: freemocap_<VERSION>_<label>.<ext>
          for dir in artifacts/installer-*; do
            label=$(basename "$dir" | sed 's/^installer-//')

            find "$dir" -type f \( \
              -name '*.exe' -o \
              -name '*.dmg' -o \
              -name '*.zip' -o \
              -name '*.AppImage' -o \
              -name '*.deb' \
            \) | while read -r file; do
              ext="${file##*.}"
              cp "$file" "release-assets/freemocap_${VERSION}_${label}.${ext}"
            done
          done

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Prepare auto-update metadata
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Copy latest.yml files from update-metadata artifacts and patch
          # the file references to match the renamed release asset names.

          # Windows: latest.yml (CUDA variant is the auto-update channel — see
          # the "Upload auto-update metadata" step comment in the build job)
          if [ -d "artifacts/update-metadata-windows-x64-cuda" ]; then
            YML=$(find artifacts/update-metadata-windows-x64-cuda -name 'latest.yml' | head -1)
            if [ -n "$YML" ]; then
              # Replace the original artifact filename with the renamed one
              sed -i "s|freemocap_.*_installer\.exe|freemocap_${VERSION}_windows-x64-cuda.exe|g" "$YML"
              cp "$YML" "release-assets/latest.yml"
              echo "Copied latest.yml for Windows"
            fi
          fi

          # macOS: latest-mac.yml (combine x64 and arm64 entries)
          # electron-updater picks the right arch from a single latest-mac.yml
          MAC_YML=""
          for dir in artifacts/update-metadata-macos-*; do
            found=$(find "$dir" -name 'latest-mac.yml' 2>/dev/null | head -1)
            if [ -n "$found" ] && [ -z "$MAC_YML" ]; then
              MAC_YML="$found"
            fi
          done
          if [ -n "$MAC_YML" ]; then
            # Patch filenames to match renamed assets
            sed -i "s|freemocap_.*_installer\.zip|freemocap_${VERSION}_macos-x64-intel.zip|g" "$MAC_YML"
            cp "$MAC_YML" "release-assets/latest-mac.yml"
            echo "Copied latest-mac.yml for macOS"
          fi

          # Linux: latest-linux.yml (CUDA variant is the auto-update channel)
          if [ -d "artifacts/update-metadata-linux-x64-cuda" ]; then
            YML=$(find artifacts/update-metadata-linux-x64-cuda -name 'latest-linux.yml' | head -1)
            if [ -n "$YML" ]; then
              sed -i "s|freemocap_.*\.AppImage|freemocap_${VERSION}_linux-x64-cuda.AppImage|g" "$YML"
              cp "$YML" "release-assets/latest-linux.yml"
              echo "Copied latest-linux.yml for Linux"
            fi
          fi

          echo "=== Final release assets ==="
          ls -lh release-assets/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists — uploading new assets only"
            gh release upload "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "Creating new draft release for $TAG"
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --generate-notes \
              --title "$TAG"
          fi
