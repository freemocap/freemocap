name: Linting Flake8

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, development ]
    paths:
      - 'freemocap/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python 3.x
        uses: wntrblm/nox@2026.02.09
        with:
          python-versions: "3.12"
      - name: Run noxfile
        run: |
          nox --session lint
