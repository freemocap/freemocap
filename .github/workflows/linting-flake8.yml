name: Linting Flake8

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, development ]
    paths:
      - 'freemocap/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python 3.x
        uses: wntrblm/nox@5a277b752f6094150e25237d47c34168e2b7526e
        with:
          python-versions: "3.12"
      - name: Run noxfile
        run: |
          nox --session lint
