# OpenCV via vcpkg (x64-windows-static triplet — static CRT /MT).
# opencv crate auto-detects vcpkg via VCPKG_ROOT.
# VCPKGRS_TRIPLET forces the static triplet (default is x64-windows-static-md which uses /MD).
# +crt-static makes Rust use /MT to match vcpkg's static CRT.
[env]
VCPKG_ROOT = "C:\\tools\\vcpkg"
VCPKGRS_TRIPLET = "x64-windows-static"
OPENCV_DISABLE_PROBES = "cmake,pkg_config"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]
