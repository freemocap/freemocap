name: Build installers (Pyinstaller + Electron)

on:
  push:
    branches:
      - development
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        type: choice
        options: [cpu, cuda, both]
        default: both

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════
  # BUILD — runs on all platform/arch/variant combos
  # ═══════════════════════════════════════════════════════
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - os: windows-latest
            platform: windows
            arch: x64
            variant: cpu
            label: windows-x64-cpu
            server-binary: freemocap_server.exe
            electron-arch: x64
            install-gpu: false

          - os: windows-latest
            platform: windows
            arch: x64
            variant: cuda
            label: windows-x64-cuda
            server-binary: freemocap_server.exe
            electron-arch: x64
            install-gpu: true

          # ── macOS Apple Silicon ──
          - os: macos-latest
            platform: macos
            arch: arm64
            variant: gpu
            label: macos-arm64-apple-silicon
            server-binary: freemocap_server
            electron-arch: arm64
            install-gpu: true

          # ── Linux x64 CPU (fits on GitHub Releases) ──
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            variant: cpu
            label: linux-x64-cpu
            server-binary: freemocap_server
            electron-arch: x64
            install-gpu: false

          # ── Linux x64 CUDA (goes to R2 — too large for GitHub) ──
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            variant: cuda
            label: linux-x64-cuda
            server-binary: freemocap_server
            electron-arch: x64
            install-gpu: true

          # ── Linux ARM64 CPU only (onnxruntime-gpu has no aarch64 wheels) ──
          - os: ubuntu-22.04-arm
            platform: linux
            arch: arm64
            variant: cpu
            label: linux-arm64-cpu
            server-binary: freemocap_server
            electron-arch: arm64
            install-gpu: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Windows code-signing prereqs ──
      - name: Validate code signing prerequisites
        if: matrix.platform == 'windows'
        run: |
          $missingSecrets = @()

          if (-not "${{ secrets.AZURE_TENANT_ID }}") { $missingSecrets += "AZURE_TENANT_ID" }
          if (-not "${{ secrets.AZURE_CLIENT_ID }}") { $missingSecrets += "AZURE_CLIENT_ID" }
          if (-not "${{ secrets.AZURE_CLIENT_SECRET }}") { $missingSecrets += "AZURE_CLIENT_SECRET" }
          if (-not "${{ secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}") { $missingSecrets += "TRUSTED_SIGNING_ACCOUNT_NAME" }
          if (-not "${{ secrets.CERTIFICATE_PROFILE_NAME }}") { $missingSecrets += "CERTIFICATE_PROFILE_NAME" }

          if ($missingSecrets.Count -gt 0) {
            Write-Error "Missing required secrets for code signing: $($missingSecrets -join ', ')"
            exit 1
          }

          Write-Output "All required code signing secrets are available"
        shell: pwsh

      # ── macOS code-signing prereqs ──
      - name: Validate macOS code signing prerequisites
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          MISSING=()
          [ -z "${{ secrets.MAC_CERTIFICATE_P12 }}" ] && MISSING+=("MAC_CERTIFICATE_P12")
          [ -z "${{ secrets.MAC_CERTIFICATE_PASSWORD }}" ] && MISSING+=("MAC_CERTIFICATE_PASSWORD")
          [ -z "${{ secrets.APPLE_ID }}" ] && MISSING+=("APPLE_ID")
          [ -z "${{ secrets.APPLE_ID_PASSWORD }}" ] && MISSING+=("APPLE_ID_PASSWORD")
          [ -z "${{ secrets.APPLE_TEAM_ID }}" ] && MISSING+=("APPLE_TEAM_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for macOS code signing: ${MISSING[*]}"
            exit 1
          fi
          echo "All required macOS code signing secrets are available"

      # ── macOS certificate installation ──
      - name: Install macOS signing certificate
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create and configure a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the .p12 certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add the temporary keychain to the search list (prepend it)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "macOS signing certificate installed successfully"

      # ── Linux system dependencies ──
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender1 \
            libv4l-dev \
            libfuse2 \
            upx-ucl \
            binutils

      # ── macOS UPX for binary compression ──
      - name: Install UPX (macOS)
        if: matrix.platform == 'macos'
        run: brew install upx

      # ── Common setup ──
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv and enable cache
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57
        with:
          enable-cache: false

      - name: Create venv
        run: uv venv

      # ── Conditional dependency install ──
      # CPU variant:  uv sync --group cpu  → skellytracker[all-cpu] (onnxruntime CPU,
      #               zero NVIDIA packages — installer fits on GitHub Releases).
      # CUDA variant: plain uv sync → tracker-default, which platform-switches to
      #               skellytracker[all-cuda] on Windows/Linux and [all-cpu] on macOS.
      - name: Install dependencies (CPU variant)
        if: "!matrix.install-gpu"
        shell: bash
        run: |
          echo "=== CPU BUILD — skellytracker[all-cpu] (onnxruntime CPU, zero NVIDIA packages) ==="
          # Plain `uv sync` uses the tracker-default group, which resolves to
          # skellytracker[all-cuda] on Linux/Windows (dragging in onnxruntime-gpu + the
          # ~1.5 GB NVIDIA CUDA stack — and there are NO aarch64 GPU wheels at all).
          # Force the CPU group explicitly so CPU installers stay small and arm64 resolves.
          uv sync --no-default-groups --group cpu

      - name: Install dependencies (CUDA variant)
        if: matrix.install-gpu
        run: |
          echo "=== CUDA BUILD — tracker-default (skellytracker[all-cuda] on Win/Linux, [all-cpu] on macOS) ==="
          uv sync

      - name: Verify installation 1/3
        run: uv pip show freemocap
      - name: Verify installation 2/3
        run: uv pip show pyinstaller
      - name: Verify installation 3/3
        run: uv pip show opencv-contrib-python

      # ── Write build metadata and secrets into the Python package ──
      - name: Write build info
        shell: bash
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-8)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          cat > freemocap/build_info.py << EOF
          """Build metadata and secrets populated by CI."""
          BUILD_GIT_SHA: str = "${{ github.sha }}"
          BUILD_GIT_SHA_SHORT: str = "${SHA_SHORT}"
          BUILD_NUMBER: str = "${{ github.run_number }}"
          BUILD_TIMESTAMP: str = "${TIMESTAMP}"
          BUILD_TAG: str = "${{ github.ref_name }}"
          SKELLYPINGS_SERVER_URL: str = "https://skellypings-401698866387.northamerica-northeast1.run.app"
          SKELLYPINGS_SECRET: str = "${{ secrets.SKELLYPINGS_SECRET }}"
          EOF

          echo "--- build_info.py (secret redacted) ---"
          sed 's/SKELLYPINGS_SECRET:.*/SKELLYPINGS_SECRET: str = "***"/' freemocap/build_info.py

      # ── PyInstaller build ──
      # FREEMOCAP_BUILD_VARIANT tells freemocap.spec whether to bundle the NVIDIA CUDA
      # runtime. Only x64 Windows/Linux GPU builds install those packages; macOS (even
      # the "gpu" matrix row uses CPU onnxruntime) and every CPU build must be 'cpu' so
      # the spec skips NVIDIA collection instead of swallowing a "package not found".
      - name: Build with PyInstaller
        env:
          FREEMOCAP_BUILD_VARIANT: ${{ (matrix.install-gpu && matrix.platform != 'macos') && 'cuda' || 'cpu' }}
        run: |
          uv pip install pyinstaller
          uv run pyinstaller ./freemocap.spec --clean

      # ── Move server BUNDLE into freemocap-ui/ ──
      # PyInstaller runs in onedir mode (freemocap.spec ends in COLLECT), so the
      # output is a *folder* `dist/freemocap_server/` holding the launcher next to
      # an `_internal/` tree of DLLs/data — NOT a single file. Move the whole folder;
      # electron bundles it via the "freemocap_server/**" glob in electron-builder.json
      # and launches `freemocap_server/<exe>` (see electron/main/app-paths.ts).
      - name: Move server bundle into freemocap-ui (Windows)
        if: matrix.platform == 'windows'
        run: |
          Move-Item -Path ".\dist\freemocap_server" -Destination ".\freemocap-ui\freemocap_server"

      - name: Move server bundle into freemocap-ui (macOS/Linux)
        if: matrix.platform != 'windows'
        run: |
          mv "./dist/freemocap_server" "./freemocap-ui/freemocap_server"
          chmod +x "./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"

      # ── Windows code signing (server binary) ──
      - name: Sign freemocap_server.exe with Trusted Signing
        if: matrix.platform == 'windows'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: freemocap
          certificate-profile-name: freemocap
          files: ${{ github.workspace }}\freemocap-ui\freemocap_server\freemocap_server.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256


      # ── macOS code signing (server bundle) ──
      # An onedir bundle contains many Mach-O files (dylibs/.so under _internal/).
      # They must be signed inside-out — nested libraries first, then the launcher —
      # or notarization (and Gatekeeper on the standalone artifact) rejects it.
      - name: Sign freemocap_server with codesign
        if: matrix.platform == 'macos'
        run: |
          SERVER_DIR="./freemocap-ui/freemocap_server"
          echo "Signing nested Mach-O libraries (inside-out)..."
          find "$SERVER_DIR" -type f \( -name '*.dylib' -o -name '*.so' \) -print0 \
            | while IFS= read -r -d '' lib; do
                codesign --force --options runtime --timestamp \
                  --sign "Developer ID Application" "$lib"
              done
          echo "Signing launcher executable..."
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" "$SERVER_DIR/${{ matrix.server-binary }}"
          codesign --verify --verbose "$SERVER_DIR/${{ matrix.server-binary }}"
          echo "Server bundle signed and verified successfully"

      # ── Upload server-only artifact (the whole onedir bundle) ──
      - name: Upload server bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.label }}
          path: |
            freemocap-ui/freemocap_server/**
          include-hidden-files: true

      # ── Electron build ──

      # ── Validate server binary exists and is executable ──
      - name: Validate server binary present and executable
        shell: bash
        run: |
          # onedir layout: freemocap-ui/freemocap_server/<launcher>[.exe] + _internal/
          SERVER_EXE="./freemocap-ui/freemocap_server/${{ matrix.server-binary }}"
          echo "Checking for server binary at $SERVER_EXE"
          if [ ! -f "$SERVER_EXE" ]; then
            echo "::error::Server binary not found: $SERVER_EXE"
            ls -la ./freemocap-ui/freemocap_server || true
            exit 1
          fi
          echo "Found server binary:"
          ls -la "$SERVER_EXE"
          # On Unix-like, ensure executable bit is set
          if [ "${{ matrix.platform }}" != "windows" ]; then
            if [ ! -x "$SERVER_EXE" ]; then
              echo "Server binary is not executable, setting +x"
              chmod +x "$SERVER_EXE" || true
            fi
          fi


      - name: Install UI dependencies
        run: |
          cd freemocap-ui
          npm install

      - name: Build UI (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd freemocap-ui
          npm run build -- --publish never

      - name: Build UI (macOS)
        if: matrix.platform == 'macos'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd freemocap-ui
          for attempt in 1 2 3; do
            echo "=== Build + notarize attempt $attempt of 3 ==="
            npm run build -- --${{ matrix.electron-arch }} --publish never && break
            if [ "$attempt" -eq 3 ]; then
              echo "All 3 attempts failed"
              exit 1
            fi
            echo "Build/notarize failed on attempt $attempt. Retrying in 30s..."
            sleep 30
          done

      - name: Build UI (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd freemocap-ui
          npm run build -- --${{ matrix.electron-arch }} --publish never

      # ── Architecture validation (Linux) ──
      # Prevents ARM binaries from being mislabeled as x64 (or vice versa).
      # Uses readelf to inspect the ELF header Machine field.
      - name: Validate binary architecture (Linux)
        if: matrix.platform == 'linux'
        run: |
          echo "=== Validating binary architecture ==="
          for appimage in freemocap-ui/release/*/*.AppImage; do
            [ -f "$appimage" ] || continue
            BIN_ARCH=$(readelf -h "$appimage" | awk '/Machine:/{print $NF}')
            case "${{ matrix.arch }}" in
              x64)   EXPECTED="X86-64" ;;
              arm64) EXPECTED="AArch64" ;;
            esac
            if [ "$BIN_ARCH" != "$EXPECTED" ]; then
              echo "::error::ARCHITECTURE MISMATCH DETECTED!"
              echo "::error::  File:     $appimage"
              echo "::error::  Actual:   $BIN_ARCH"
              echo "::error::  Expected: $EXPECTED"
              echo "::error::"
              echo "::error::  This build produced a binary for the WRONG architecture."
              echo "::error::  Possible causes:"
              echo "::error::    - Electron-builder ignored the --${{ matrix.electron-arch }} CLI flag"
              echo "::error::    - electron-builder.json 'arch' array still contains both architectures"
              echo "::error::    - Cross-compilation misconfiguration"
              echo "::error::"
              echo "::error::  Refusing to publish. Fix the build config and re-run."
              exit 1
            fi
            echo "✓ Architecture OK: $(basename "$appimage") = $BIN_ARCH"
          done
          # Also validate .deb if present
          for deb in freemocap-ui/release/*/*.deb; do
            [ -f "$deb" ] || continue
            # .deb contains a data.tar.* with the binary; check the ar archive header
            DEB_ARCH=$(dpkg-deb --info "$deb" 2>/dev/null | awk '/Architecture:/{print $NF}')
            if [ -n "$DEB_ARCH" ]; then
              case "${{ matrix.arch }}" in
                x64)   EXPECTED_DEB="amd64" ;;
                arm64) EXPECTED_DEB="arm64" ;;
              esac
              if [ "$DEB_ARCH" != "$EXPECTED_DEB" ]; then
                echo "::error::DEB ARCHITECTURE MISMATCH! $deb = $DEB_ARCH, expected $EXPECTED_DEB"
                exit 1
              fi
              echo "✓ DEB architecture OK: $(basename "$deb") = $DEB_ARCH"
            fi
          done

      # ── R2 upload for CUDA (oversized) builds ──
      # CUDA builds bundle NVIDIA runtime libraries (~1.5 GB) and exceed
      # GitHub's 2 GB file size limit. They go to Cloudflare R2 instead.
      - name: Upload CUDA builds to Cloudflare R2
        if: matrix.variant == 'cuda'
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "::warning::R2 credentials not configured — skipping R2 upload"
            echo "::warning::Set R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET secrets"
            exit 0
          fi

          echo "=== Uploading CUDA builds to Cloudflare R2 ==="
          pip install awscli

          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            # Not a tag push — use run number as version placeholder
            VERSION="dev-${{ github.run_number }}"
          fi

          for file in freemocap-ui/release/*/*.AppImage freemocap-ui/release/*/*.deb; do
            [ -f "$file" ] || continue
            ext="${file##*.}"
            aws s3 cp "$file" \
              "s3://${R2_BUCKET}/releases/v${VERSION}/freemocap_${VERSION}_${{ matrix.label }}.${ext}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress
            echo "R2: freemocap_${VERSION}_${{ matrix.label }}.${ext}"
          done

          # Upload auto-update metadata for the CUDA variant
          for yml in freemocap-ui/release/*/latest-linux.yml; do
            [ -f "$yml" ] || continue
            aws s3 cp "$yml" \
              "s3://${R2_BUCKET}/releases/v${VERSION}/latest-linux-${{ matrix.variant }}.yml" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress
            echo "R2: latest-linux-${{ matrix.variant }}.yml"
          done

          echo "=== R2 upload complete ==="

      # ── Windows installer signing ──
      - name: Sign Electron installer with Trusted Signing
        if: matrix.platform == 'windows'
        uses: azure/trusted-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: freemocap
          certificate-profile-name: freemocap
          files-folder: ${{ github.workspace }}\freemocap-ui\release
          files-folder-filter: "*.exe"
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Upload final installer artifacts (uses label for human-readable names) ──
      - name: Upload installer artifacts (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.exe
          include-hidden-files: true

      - name: Upload installer artifacts (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.dmg
            freemocap-ui/release/*/*.zip
          include-hidden-files: true

      - name: Upload installer artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.label }}
          path: |
            freemocap-ui/release/*/*.AppImage
            freemocap-ui/release/*/*.deb
          include-hidden-files: true

      # ── Upload auto-update metadata (latest*.yml) ──
      - name: Upload auto-update metadata (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest.yml
          include-hidden-files: true

      - name: Upload auto-update metadata (macOS ARM)
        if: matrix.platform == 'macos' && matrix.arch == 'arm64'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest-mac.yml
          include-hidden-files: true

      - name: Upload auto-update metadata (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: update-metadata-${{ matrix.label }}
          path: |
            freemocap-ui/release/**/latest-linux.yml
          include-hidden-files: true


      # ── macOS keychain cleanup ──
      - name: Clean up macOS keychain
        if: matrix.platform == 'macos' && always()
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # ═══════════════════════════════════════════════════════
  # RELEASE — only runs on tag pushes (e.g. v2.0.0)
  #
  # Downloads all build artifacts and renames them with
  # human-readable platform/arch/variant labels for the
  # GitHub Release page.
  #
  # CPU variants → GitHub Releases (fit under 2 GB limit)
  # CUDA variants → Cloudflare R2 (uploaded during build)
  # ═══════════════════════════════════════════════════════
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Extract version from tag (e.g. refs/tags/v2.0.0 → 2.0.0)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION"

          # ── Server bundles (onedir: launcher + _internal/ tree) ──
          # Artifact directories are named server-<label>, e.g.:
          #   server-windows-x64-cpu, server-windows-x64-cuda,
          #   server-macos-arm64-apple-silicon,
          #   server-linux-x64-cpu, server-linux-x64-cuda, server-linux-arm64-cpu
          # Each holds a PyInstaller onedir bundle — the launcher won't run without its
          # _internal/ tree, so ship the whole bundle as a zip.
          for dir in artifacts/server-*; do
            label=$(basename "$dir" | sed 's/^server-//')
            if [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "::warning::Empty server artifact in $dir — skipping"
              continue
            fi
            ( cd "$dir" && zip -qr "$OLDPWD/release-assets/freemocap_server_${VERSION}_${label}.zip" . )
            echo "Zipped server bundle: freemocap_server_${VERSION}_${label}.zip"
          done

          # ── App installers — all except Linux CUDA (which goes to R2) ──
          # CPU installers + Windows CUDA fit under GitHub's 2 GB file limit.
          # Linux CUDA bundles NVIDIA runtime libraries (~1.5 GB extra, >2 GB total)
          # and is uploaded to Cloudflare R2 during the build job instead.
          for dir in artifacts/installer-*; do
            label=$(basename "$dir" | sed 's/^installer-//')

            # Skip Linux CUDA — it goes to R2
            case "$label" in
              linux-*-cuda) continue ;;
            esac

            find "$dir" -type f \( \
              -name '*.exe' -o \
              -name '*.dmg' -o \
              -name '*.zip' -o \
              -name '*.AppImage' -o \
              -name '*.deb' \
            \) | while read -r file; do
              ext="${file##*.}"
              cp "$file" "release-assets/freemocap_${VERSION}_${label}.${ext}"
            done
          done

          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Prepare auto-update metadata
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Copy latest.yml files from update-metadata artifacts and patch
          # the file references to match the renamed release asset names.

          # Windows: latest.yml
          if [ -d "artifacts/update-metadata-windows-x64-cpu" ]; then
            YML=$(find artifacts/update-metadata-windows-x64-cpu -name 'latest.yml' | head -1)
            if [ -n "$YML" ]; then
              # Replace the original artifact filename with the renamed one
              sed -i "s|freemocap_.*_installer\.exe|freemocap_${VERSION}_windows-x64-cpu.exe|g" "$YML"
              cp "$YML" "release-assets/latest.yml"
              echo "Copied latest.yml for Windows (CPU)"
            fi
          fi

          # macOS: latest-mac.yml (combine x64 and arm64 entries)
          # electron-updater picks the right arch from a single latest-mac.yml
          MAC_YML=""
          for dir in artifacts/update-metadata-macos-*; do
            found=$(find "$dir" -name 'latest-mac.yml' 2>/dev/null | head -1)
            if [ -n "$found" ] && [ -z "$MAC_YML" ]; then
              MAC_YML="$found"
            fi
          done
          if [ -n "$MAC_YML" ]; then
            # Patch filenames to match renamed assets (Apple Silicon only)
            sed -i "s|freemocap_.*_installer\.zip|freemocap_${VERSION}_macos-arm64-apple-silicon.zip|g" "$MAC_YML"
            cp "$MAC_YML" "release-assets/latest-mac.yml"
            echo "Copied latest-mac.yml for macOS"
          fi

          # Linux CPU: latest-linux.yml
          if [ -d "artifacts/update-metadata-linux-x64-cpu" ]; then
            YML=$(find artifacts/update-metadata-linux-x64-cpu -name 'latest-linux.yml' | head -1)
            if [ -n "$YML" ]; then
              sed -i "s|freemocap_.*\.AppImage|freemocap_${VERSION}_linux-x64-cpu.AppImage|g" "$YML"
              cp "$YML" "release-assets/latest-linux.yml"
              echo "Copied latest-linux.yml for Linux (CPU)"
            fi
          fi

          # Also include linux-arm64-cpu latest-linux.yml if present
          if [ -d "artifacts/update-metadata-linux-arm64-cpu" ]; then
            YML=$(find artifacts/update-metadata-linux-arm64-cpu -name 'latest-linux.yml' | head -1)
            if [ -n "$YML" ]; then
              echo "Linux ARM64 latest-linux.yml available at: $YML"
              # Note: electron-updater currently only supports one latest-linux.yml;
              # ARM64 auto-update metadata is available for future use.
            fi
          fi

          echo "=== Final release assets ==="
          ls -lh release-assets/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists — uploading new assets only"
            gh release upload "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            echo "Creating new draft release for $TAG"
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --generate-notes \
              --title "$TAG"
          fi
