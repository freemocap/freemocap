name: Deploy docs site

on:
  # Docs-only changes pushed to the active branch.
  push:
    branches: [main]
    paths:
      - 'freemocap-docs/**'
      - '.github/workflows/deploy-docs.yml'
  # Rebuild after every release/installer run so the download page picks up the new
  # version and its R2 asset links. Fires when the build-installers workflow finishes
  # (which runs on every v* tag). NOTE: workflow_run only triggers when THIS file is on
  # the repo's default branch.
  workflow_run:
    workflows: ['Build installers (Pyinstaller + Electron)']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: freemocap-docs
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: freemocap-docs/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: freemocap-docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
