[project]
name = "freemocap"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "aniposelib>=0.7.0",
    #    "freemocap-blender-addon",
    "ajc27_freemocap_blender_addon==v2024.12.1032",
    "libsass>=0.23.0",
    "opencv-contrib-python==4.10.*",
    "pyinstaller>=6.11.0",
    "requests>=2.32.3",
    #    "skelly-synchronize",
    "skelly-viewer",
    "skellycam",
    "skellyforge",
    "skellytracker[mediapipe]",
    "pydantic>=2.10.4",
    "numpydantic>=1.6.7",
    #    "ltrt"
    "scikit-learn>=1.7.2",
    "pyceres>=2.5",
    "tomli-w>=1.2.0",
]

[tool.uv.sources]
skellycam = { git = "https://github.com/freemocap/skellycam", branch = "development" }
skellytracker = { git = "https://github.com/freemocap/skellytracker", branch = "development"}
skellyforge = { git = "https://github.com/freemocap/skellyforge", branch = "development" }

[project.scripts]
freemocap = "freemocap.__main__:main"
[tool.setuptools]
py-modules = ["freemocap"]
[tool.uv]
package = true


[tool.bumpver]
current_version = "v1.4.7"
version_pattern = "vMAJOR.MINOR.PATCH[-TAG]"
commit_message = "Bump version {old_version} -> {new_version}"
commit = true
tag = true
push = true

[tool.bumpver.file_patterns]
#"pyproject.toml" = ['current_version = "{version}"', 'version = "{version}"']
"freemocap/__init__.py" = ["{version}"]
".github/workflows/*_installer.yml" = ['export PYAPP_PROJECT_VERSION={version}']




# =============================================================================
# Dev dependencies
# =============================================================================
# Install with:  uv sync --group dev
# =============================================================================

[dependency-groups]
dev = [
    "bumpver",
    "pip-tools",
    "pytest>=8.4.0",
    "pytest-asyncio>=1.0.0",
    "httpx>=0.28.0",
    "nuitka>=2.7.7",
    "pyinstaller>=6.15.0",
    "ruff>=0.9.0",
    "poethepoet>=0.32.0",
]


# =============================================================================
# Task runner (poethepoet)
# =============================================================================
# List all tasks:        uv run poe --help
#
# Type-checking imports:
#   uv run poe tc-check    Preview which imports can move behind TYPE_CHECKING
#   uv run poe tc-fix      Move them automatically
#   uv run poe tc          Move them + run tests to verify nothing broke
#
# Linting:
#   uv run poe lint        Run all ruff lint rules (report only)
#   uv run poe lint-fix    Auto-fix all ruff lint violations
#
# Testing:
#   uv run poe test        Run pytest
#
# ---- Handling false positives ----
#
# Ruff is smart about isinstance/issubclass — it won't move imports that
# appear in those calls. But if ruff tries to move an import that IS used
# at runtime (e.g. passed to a registry, used in a TypeAdapter, or checked
# in a way ruff can't see), suppress it with a noqa comment on the import:
#
#   from freemocap.core.pipeline.pipeline_configs import DetectorSpec  # noqa: TC001
#
# The rule codes are:
#   TC001 — stdlib import (e.g. pathlib.Path used in isinstance)
#   TC002 — third-party import (e.g. numpy.ndarray used in isinstance)
#   TC003 — first-party import (e.g. your own types used in isinstance)
#
# Common situations where you MUST keep an import at runtime (use noqa):
#   - isinstance(x, SomeClass) / issubclass(x, SomeClass)
#     (ruff usually catches these, but check if it doesn't)
#   - TypeAdapter(SomeModel) or model_validate() with a type argument
#   - Passing a class to a function that does runtime type inspection
#   - Using a class as a dict key or in a set for type dispatch
#   - Base classes (class Foo(SomeBase):) — ruff always catches these
#
# =============================================================================

[tool.poe.tasks]
tc-check = { cmd = "ruff check --select TC freemocap/", help = "Preview type-only imports that can move behind TYPE_CHECKING" }
tc-fix   = { cmd = "ruff check --select TC --fix freemocap/", help = "Move type-only imports behind TYPE_CHECKING" }
tc       = { sequence = ["tc-fix", "test"], help = "Move type-only imports + run tests to verify" }
lint     = { cmd = "ruff check freemocap/", help = "Run all ruff lint rules" }
lint-fix = { cmd = "ruff check --fix freemocap/", help = "Auto-fix all ruff lint violations" }

# --- Testing ---
test          = { cmd = "pytest freemocap/tests/ -v", help = "Run all backend tests" }
test-schema   = { cmd = "pytest freemocap/tests/test_schema_contract.py -v", help = "Run schema contract tests (frontend/backend sync)" }
test-settings = { cmd = "pytest freemocap/tests/test_settings_manager.py -v", help = "Run SettingsManager unit tests" }
test-http     = { cmd = "pytest freemocap/tests/test_http_config_endpoints.py -v", help = "Run HTTP endpoint integration tests" }
test-ws       = { cmd = "pytest freemocap/tests/test_websocket_settings_protocol.py -v", help = "Run WebSocket protocol tests" }
test-sync     = { cmd = "pytest freemocap/tests/test_schema_contract.py freemocap/tests/test_settings_manager.py freemocap/tests/test_http_config_endpoints.py freemocap/tests/test_websocket_settings_protocol.py -v", help = "Run all frontend/backend sync tests" }
test-all      = { sequence = ["test"], help = "Run all backend tests (run `npm test` in freemocap-ui/ separately for frontend)" }

[tool.poe.tasks.test-ui]
cmd  = "npm run test"
cwd  = "freemocap-ui"
help = "Run frontend tests — run `npm test` in freemocap-ui/ )"


# =============================================================================
# Pytest config
# =============================================================================

[tool.pytest.ini_options]
asyncio_mode = "auto"


# =============================================================================
# Ruff linter config
# =============================================================================
# TC rules move imports that are ONLY used in type annotations behind an
# `if TYPE_CHECKING:` block, so they don't execute at runtime. This makes
# multiprocessing child process spawns faster (fewer files to import).
#
# Ruff automatically detects and preserves imports used in:
#   - isinstance() / issubclass() calls
#   - Base classes
#   - Default values and runtime expressions
#   - Pydantic field types (via runtime-evaluated-base-classes below)
#   - Dataclass field types (via runtime-evaluated-decorators below)
#
# If ruff incorrectly flags an import that IS needed at runtime,
# add  # noqa: TC003  (or TC001/TC002) to that import line.
# =============================================================================

[tool.ruff.lint]
select = [
    "TC",    # flake8-type-checking: move type-only imports behind TYPE_CHECKING
]

[tool.ruff.lint.flake8-type-checking]
# Pydantic evaluates field type annotations at runtime for validation/serialization.
# Imports used as field types on these base classes must NOT be moved behind
# TYPE_CHECKING or Pydantic will fail at class creation.
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic.BaseSettings",
]
runtime-evaluated-decorators = [
    "dataclasses.dataclass",
]
exempt-modules = ["typing", "typing_extensions"]